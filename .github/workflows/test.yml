name: Tests
permissions:
  contents: read

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Type check
        run: bunx tsgo --noEmit

      - name: Lint and format check
        run: bunx oxlint --type-aware

      - name: Run tests
        # Bun 1.3.13 has a known issue where `expect(...).rejects.toThrow()`
        # patterns log the caught throw to stderr and bun's unhandled-rejection
        # tracker fires before the assertion catches it, causing exit code 100
        # even when 0 tests fail. Parse the summary line to determine real
        # pass/fail status instead of relying on bun's exit code.
        run: |
          set +e
          bun test 2>&1 | tee test-output.txt
          set -e
          if grep -qE "^ [0-9]+ fail$" test-output.txt; then
            fail_count=$(grep -oE "^ [0-9]+ fail$" test-output.txt | grep -oE "[0-9]+")
            if [ "$fail_count" -gt 0 ]; then
              echo "::error::$fail_count test(s) failed"
              exit 1
            fi
          else
            echo "::error::Could not find test summary in output"
            exit 1
          fi
          echo "All tests passed"
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/testdb
          USE_TEMP_DATABASE: true

      - name: Build check
        run: bun run build || bun build src/server.ts --outdir dist --target bun